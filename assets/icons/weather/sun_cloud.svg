<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Small sun peeking above cloud, top-left area -->
  <circle cx="20" cy="22" r="8" fill="#C8A000"/>
  <!-- Sun rays (short) -->
  <rect x="19" y="10" width="3" height="6" fill="#C8A000"/>
  <rect x="29" y="21" width="6" height="3" fill="#C8A000"/>
  <rect x="25.2" y="13.2" width="3" height="6" fill="#C8A000" transform="rotate(45 26.7 16.2)"/>
  <!-- Cloud body covering bottom of sun -->
  <ellipse cx="38" cy="40" rx="14" ry="10" fill="#C8A000"/>
  <ellipse cx="26" cy="44" rx="10" ry="8" fill="#C8A000"/>
  <ellipse cx="48" cy="44" rx="8" ry="7" fill="#C8A000"/>
  <rect x="16" y="40" width="40" height="12" fill="#C8A000"/>
</svg>
