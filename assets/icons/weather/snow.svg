<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Compact cloud -->
  <ellipse cx="32" cy="22" rx="14" ry="9" fill="#C8A000"/>
  <ellipse cx="21" cy="26" rx="9" ry="7" fill="#C8A000"/>
  <ellipse cx="44" cy="26" rx="8" ry="6" fill="#C8A000"/>
  <ellipse cx="28" cy="15" rx="8" ry="6" fill="#C8A000"/>
  <rect x="12" y="22" width="38" height="10" rx="2" fill="#C8A000"/>
  <!-- Snowflake 1 (asterisk *) -->
  <g transform="translate(22,44)">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#C8A000" stroke-width="2" stroke-linecap="round"/>
    <line x1="-4.3" y1="-2.5" x2="4.3" y2="2.5" stroke="#C8A000" stroke-width="2" stroke-linecap="round"/>
    <line x1="-4.3" y1="2.5" x2="4.3" y2="-2.5" stroke="#C8A000" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Snowflake 2 (asterisk *) -->
  <g transform="translate(42,44)">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#C8A000" stroke-width="2" stroke-linecap="round"/>
    <line x1="-4.3" y1="-2.5" x2="4.3" y2="2.5" stroke="#C8A000" stroke-width="2" stroke-linecap="round"/>
    <line x1="-4.3" y1="2.5" x2="4.3" y2="-2.5" stroke="#C8A000" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Snowflake 3 (smaller, lower) -->
  <g transform="translate(32,54)">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#C8A000" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-3.5" y1="-2" x2="3.5" y2="2" stroke="#C8A000" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-3.5" y1="2" x2="3.5" y2="-2" stroke="#C8A000" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
