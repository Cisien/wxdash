<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Compact cloud -->
  <ellipse cx="32" cy="20" rx="14" ry="9" fill="#C8A000"/>
  <ellipse cx="21" cy="24" rx="9" ry="7" fill="#C8A000"/>
  <ellipse cx="44" cy="24" rx="8" ry="6" fill="#C8A000"/>
  <ellipse cx="28" cy="13" rx="8" ry="6" fill="#C8A000"/>
  <rect x="12" y="20" width="38" height="10" rx="2" fill="#C8A000"/>
  <!-- Rain droplet (left) -->
  <path d="M22 36 L20 41 A3 3 0 1 0 24 41 Z" fill="#C8A000"/>
  <!-- Snowflake asterisk (right) -->
  <g transform="translate(42,42)">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#C8A000" stroke-width="2" stroke-linecap="round"/>
    <line x1="-4.3" y1="-2.5" x2="4.3" y2="2.5" stroke="#C8A000" stroke-width="2" stroke-linecap="round"/>
    <line x1="-4.3" y1="2.5" x2="4.3" y2="-2.5" stroke="#C8A000" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Small droplet and snowflake lower -->
  <path d="M28 50 L27 53 A2 2 0 1 0 29 53 Z" fill="#C8A000"/>
  <g transform="translate(38,54)">
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#C8A000" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-2.6" y1="-1.5" x2="2.6" y2="1.5" stroke="#C8A000" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-2.6" y1="1.5" x2="2.6" y2="-1.5" stroke="#C8A000" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
