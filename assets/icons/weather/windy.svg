<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 3 horizontal wind lines (curved/wavy representation) -->
  <!-- Top wind line (longer) -->
  <rect x="8" y="18" width="38" height="5" rx="2.5" fill="#C8A000"/>
  <circle cx="46" cy="20.5" r="5" fill="none" stroke="#C8A000" stroke-width="5"/>
  <!-- Clip the circle to show only bottom-left half — approximate with a filled arc via polygon -->
  <!-- Middle wind line (medium, offset) -->
  <rect x="8" y="30" width="30" height="5" rx="2.5" fill="#C8A000"/>
  <!-- Bottom wind line (shorter) -->
  <rect x="8" y="42" width="44" height="5" rx="2.5" fill="#C8A000"/>
  <circle cx="52" cy="44.5" r="5" fill="none" stroke="#C8A000" stroke-width="5"/>
</svg>
