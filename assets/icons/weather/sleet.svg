<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Compact cloud -->
  <ellipse cx="32" cy="22" rx="14" ry="9" fill="#C8A000"/>
  <ellipse cx="21" cy="26" rx="9" ry="7" fill="#C8A000"/>
  <ellipse cx="44" cy="26" rx="8" ry="6" fill="#C8A000"/>
  <ellipse cx="28" cy="15" rx="8" ry="6" fill="#C8A000"/>
  <rect x="12" y="22" width="38" height="10" rx="2" fill="#C8A000"/>
  <!-- Ice pellets (diamond/angular shapes, distinct from round drizzle) -->
