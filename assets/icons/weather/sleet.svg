  <polygon points="33,38 36,42 33,46 30,42" fill="#C8A000"/>
  <polygon points="45,36 48,40 45,44 42,40" fill="#C8A000"/>
  <!-- Bounce lines (pellets bouncing) -->
  <line x1="19" y1="46" x2="17" y2="48" stroke="#C8A000" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="33" y1="48" x2="31" y2="50" stroke="#C8A000" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="45" y1="46" x2="47" y2="48" stroke="#C8A000" stroke-width="1.5" stroke-linecap="round"/>
</svg>
