<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C8A000"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bgGrad)" stroke="#3A3A3A" stroke-width="2"/>
  <!-- Track arc: 290deg, gap centered at bottom. Start=125° End=55° (SVG CW from 3 o'clock) -->
  <path d="M 73,207 A 96,96 0 1,1 183,207" fill="none" stroke="#2A2A2A" stroke-width="16" stroke-linecap="round"/>
  <!-- Fill arc: ~200deg from same start point, ends at 325° -->
  <path d="M 73,207 A 96,96 0 1,1 207,73" fill="none" stroke="url(#arcGrad)" stroke-width="16" stroke-linecap="round"/>
  <!-- Wind rose hint: concentric circles -->
  <circle cx="128" cy="128" r="28" fill="none" stroke="#3A3A3A" stroke-width="0.8"/>
  <circle cx="128" cy="128" r="18" fill="none" stroke="#3A3A3A" stroke-width="0.6"/>
  <!-- Wind rose crosshairs -->
  <line x1="128" y1="100" x2="128" y2="156" stroke="#3A3A3A" stroke-width="0.6"/>
  <line x1="100" y1="128" x2="156" y2="128" stroke="#3A3A3A" stroke-width="0.6"/>
  <!-- Needle pointing NE -->
  <polygon points="128,100 125,132 131,132" fill="#C8A000" opacity="0.85"/>
  <!-- Center dot -->
  <circle cx="128" cy="128" r="3.5" fill="#1A1A1A" stroke="#C8A000" stroke-width="1.5"/>
  <!-- Value text -->
  <text x="128" y="178" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="28" fill="#C8A000">wx</text>
</svg>
